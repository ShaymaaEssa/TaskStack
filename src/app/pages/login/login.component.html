<header>
  <div class="container px-10 py-6">
    <div class="logo-item flex items-center gap-2">
      <div class="logo-img">
        <img src="../../../assets/signup/logo.png" alt="Logo" />
      </div>
      <div class="logo-text">
        <h1
          class="text-capitalize text-[#041B3C] font-bold font-[Inter] text-[20px] leading-7 tracking-[-0.5px]"
        >
          Taskly
        </h1>
      </div>
    </div>
  </div>
</header>

<section class="login-section">
  <div class="section-title h-37 w[232.14px] flex flex-col justify-end pb-10">
    <h1
      class="font-semibold text-[#041B3C] leading-8 tracking-[-0.6px] text-center text-[24px]"
    >
      Welcome Back
    </h1>

    <p class="text-[14px] leading-5 text-[#4F5F7B] text-center">
      please enter your details to access your workspace
    </p>
  </div>

  <div class="max-w-[384px] w-[85.5] h-83.5 pb-4 mx-auto">
    <form
      [formGroup]="loginForm"
      (ngSubmit)="submitForm()"
      class="signup-form pb-16px mx-auto flex flex-col gap-6 w-full h-85.5"
    >
      <div class="form-group flex flex-col gap-2">
        <label
          for="email"
          class="block text-[11px] text-[#434654] leading-[16.5px] tracking-[0.55px] font-medium mb-2 uppercase"
          >Email Address</label
        >

        <div class="relative">
          <span
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-[20px]"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              height="20px"
              viewBox="0 -960 960 960"
              width="20px"
              fill="#737685"
            >
              <path
                d="M168-192q-29.7 0-50.85-21.16Q96-234.32 96-264.04v-432.24Q96-726 117.15-747T168-768h624q29.7 0 50.85 21.16Q864-725.68 864-695.96v432.24Q864-234 842.85-213T792-192H168Zm312-240L168-611v347h624v-347L480-432Zm0-85 312-179H168l312 179Zm-312-94v-85 432-347Z"
              />
            </svg>
          </span>
          <input
            formControlName="email"
            type="email"
            id="email"
            placeholder="curator@workspace.com"
            class="border w-full border-[#D1D5DB] rounded-lg py-4.5 px-4 bg-[#D7E2FF] text-[16px] focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
      </div>

      <div class="form-group flex flex-col gap-2">
        <div class="flex flex-row justify-between">
          <label
            for="password"
            class="block text-[11px] text-[#434654] leading-[16.5px] tracking-[0.55px] font-medium mb-2 uppercase"
            >Password</label
          >

          <a
            href=""
            class="text-[#003D9B] font-bold text-[11px] leading-[16.5px]"
          >
            Forget Password?
          </a>
        </div>

        <div class="relative">
          <button
            class="icon-container absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer"
            (click)="showPassword = !showPassword"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              height="24px"
              viewBox="0 -960 960 960"
              width="24px"
              fill="#737685"
            >
              <path
                d="M607.5-372.5Q660-425 660-500t-52.5-127.5Q555-680 480-680t-127.5 52.5Q300-575 300-500t52.5 127.5Q405-320 480-320t127.5-52.5Zm-204-51Q372-455 372-500t31.5-76.5Q435-608 480-608t76.5 31.5Q588-545 588-500t-31.5 76.5Q525-392 480-392t-76.5-31.5ZM214-281.5Q94-363 40-500q54-137 174-218.5T480-800q146 0 266 81.5T920-500q-54 137-174 218.5T480-200q-146 0-266-81.5ZM480-500Zm207.5 160.5Q782-399 832-500q-50-101-144.5-160.5T480-720q-113 0-207.5 59.5T128-500q50 101 144.5 160.5T480-280q113 0 207.5-59.5Z"
              />
            </svg>
          </button>

          <input
            formControlName="password"
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            class="border w-full border-[#D1D5DB] rounded-lg py-4.5 px-4 bg-[#D7E2FF] text-[16px] focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
      </div>

      <button
        type="submit"
        class="bg-linear-to-r from-[#003D9B] to-[#0052CC] shadow-[0_4px_6px_-4px_#003D9B1A,0_10px_15px_-3px_#003D9B1A] text-white py-2 px-4 rounded-lg font-semibold text-[16px] leading-5 text-center w-full h-14 flex flex-row gap-2 justify-center items-center mt-4 cursor-pointer"
      >
        <span class="font-semibold text-[16px] leading-6 text-center text-white"
          >Sign In
        </span>
        <div
          class="icon-container w-[13.33px] h-[13.33px] flex items-center justify-center"
        >
          <img
            src="../../../assets/login/arrow.png"
            alt="right arrow"
            class="w-full"
          />
        </div>
      </button>
    </form>
  </div>
</section>
