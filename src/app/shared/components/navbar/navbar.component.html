<header
  class="w-full fixed top-0 left-0 right-0 h-fit border-b flex flex-row justify-between items-center px-6 py-3 bg-background border-black/10"
>
  <div class="text-container w-fit h-fit flex flex-row gap-4 lg:invisible">
    <button class="w-fit h-fit rounded-xs p-1" (click)="toggleSidebar()">
      <div class="icon-container w-fit h-fit">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="24px"
          viewBox="0 -960 960 960"
          width="24px"
          fill="var(--color-blue-041B3C)"
        >
          <path
            d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"
          />
        </svg>
      </div>
    </button>

    <h1
      class="font-bold text-xl leading-7 tracking-[-0.5px] text-blue-041B3C pe-[92.31px]"
    >
      TASKLY
    </h1>
  </div>

  <div>
    <div class="relative lg:ps-2">
      <div
        class="verticalborder lg:border-s lg:border-gray-C3C6D6/30 lg:ps-4 lg:flex lg:flex-row lg:gap-3"
      >
        <div class="hidden lg:block">
          <div>
            <span
              class="font-bold text-sm leading-5 text-right text-blue-041B3C"
              >{{ userName }}</span
            >
          </div>
          <div>
            <span
              class="font-bold text-[10px] leading-5 tracking-[1px] text-right text-blue-041B3C"
              >{{ department }}</span
            >
          </div>
        </div>
        <button
          class="image-info bg-blue-0052CC w-10 h-10 rounded-xl shadow-navbar-image flex justify-center items-center"
          (click)="toggleDropdown()"
        >
          <span class="font-bold text-[16px] leading-6 text-white">{{
            nameIntials
          }}</span>
        </button>

        @if (isDropdownOpen) {
          <!-- Dropdown Menu Layer -->
          <div
            class="absolute right-0 top-full mt-2 w-48 bg-white border border-black/10 rounded-lg shadow-lg py-1 z-50 origin-top-right animate-in fade-in zoom-in-95 duration-100"
          >
            <!-- Optional Mobile Profile Header Info inside dropdown -->
            <div class="px-4 py-2 border-b border-gray-100 lg:hidden">
              <p class="text-sm font-bold text-blue-041B3C truncate">
                {{ userName }}
              </p>
              <p class="text-xs text-gray-500 truncate">{{ department }}</p>
            </div>

            <!-- Logout Action Row Element -->
            <button
              (click)="logout()"
              class="w-full text-left px-4 py-2.5 text-sm font-medium text-red-600 hover:bg-red-50 flex items-center gap-2 transition-colors cursor-pointer"
            >
              <!-- Logout Door SVG Icon -->
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                ></path>
              </svg>
              Log out
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</header>
